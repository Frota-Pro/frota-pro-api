name: Build and Deploy API

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build JAR
        run: mvn -B clean package -DskipTests

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

      - name: Build image
        run: docker build -t arthenyo/frotapro-api:latest .

      - name: Push image
        run: docker push arthenyo/frotapro-api:latest

      - name: Deploy on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e

            echo "== whoami =="; whoami
            echo "== home =="; echo "$HOME"
            echo "== pwd =="; pwd

            echo "== list deploy dir =="
            ls -la /home/frotapro/deploy/frotapro || true

            echo "== cd deploy dir =="
            cd /home/frotapro/deploy/frotapro

            echo "== docker version =="
            docker --version

            echo "== docker compose version =="
            docker compose version

            echo "== docker ps =="
            docker ps

            echo "== pull/up api =="
            docker compose pull api
            docker compose up -d api

            echo "== api logs =="
            docker logs --tail=200 frotapro-api
