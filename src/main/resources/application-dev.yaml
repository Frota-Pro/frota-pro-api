spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  file:
    name: logs/frotapro-api.log

frotapro:
  security:
    cors:
      allowed-origins:
        - http://localhost:*
        - http://127.0.0.1:*
    prometheus-permit-all: true
