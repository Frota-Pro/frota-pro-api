spring:
  application:
    name: frotaPro
  cache:
    type: simple

  jackson:
    mapper:
      accept-case-insensitive-enums: true

  kafka:
    consumer:
      group-id: frota-pro-api-v2
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "br.com.frotasPro.api.integracao.dto,br.com.frotasPro.integradora.winthor.dto"
        spring.json.use.type.headers: false

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always


logging:
  file:
    name: logs/frotapro.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"

frotapro:
  empresa-sync-id: 11111111-2222-3333-4444-555555555555

  integracao:
    integradora-base-url: http://localhost:8081
    timeout-ms: 2000

  logs:
    api-file: logs/frotapro.log
    integradora-logfile-path: /actuator/logfile

  kafka:
    topics:
      carga-sync-request: frotapro.carga.sync.request
      carga-sync-response: frotapro.carga.sync.response
      motorista-sync-request: frotapro.motorista.sync.request
      motorista-sync-response: frotapro.motorista.sync.response
      caminhao-sync-request: frotapro.caminhao.sync.request
      caminhao-sync-response: frotapro.caminhao.sync.response

  storage:
    upload-dir: ./data/uploads
  security:
    cors:
      allowed-origins:
        - http://localhost:*
        - http://127.0.0.1:*
    prometheus-permit-all: false
    jwt:
      access-token-seconds: 900
      refresh-token-seconds: 604800
    login:
      rate-limit:
        ip:
          max-attempts: 30
          window-seconds: 60
        user:
          max-attempts: 12
          window-seconds: 60
      block:
        first-threshold: 5
        first-seconds: 300
        second-threshold: 8
        second-seconds: 900
        third-threshold: 10
        third-seconds: 1800


jwt:
  public:
    key: ${JWT_PUBLIC_KEY}
  private:
    key: ${JWT_PRIVATE_KEY}
