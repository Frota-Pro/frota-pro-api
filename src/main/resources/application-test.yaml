spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

frotapro:
  security:
    cors:
      allowed-origins:
        - http://localhost:3000
    prometheus-permit-all: true
